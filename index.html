/* ================================================================
   קריאה מגיליון גוגל דרך Google Visualization API
   ================================================================ */
async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/);
  if (!match) throw new Error('תשובה לא תקינה מגיליון הגוגל');
  const data = JSON.parse(match[1]);
  if (data.status === 'error') throw new Error(data.errors?.[0]?.message || 'שגיאה בגיליון');
  return data.table;
}

function tableToRows(table) {
  if (!table || !table.rows) return [];
  return table.rows.map(row =>
    (row.c || []).map(cell => {
      if (!cell || cell.v === null || cell.v === undefined) return '';
      return cell.v;
    })
  ).filter(row => row.some(v => v !== ''));
}

  btn.classList.add('spinning');
  try {
    // קוראים את שתי הלשוניות במקביל: "תוצאות" לנקודות כל נבחרת, "דירוג" לבתים
    const [resultsTable, rankTable] = await Promise.all([
      fetchSheet('תוצאות').catch(() => null),  // אם נכשל — לא קריטי, נציג בלי פירוט נקודות
      fetchSheet('דירוג')
    ]);

    // בניית מפת נקודות לכל נבחרת: עמודה A = שם, עמודה E = נקודות (אינדקס 4)
    TEAM_POINTS = {};
    if (resultsTable) {
      tableToRows(resultsTable).forEach(r => {
        const teamName = String(r[0] || '').trim();
        if (teamName) TEAM_POINTS[teamName] = Number(r[4]) || 0;
      });
    }

    const rows = tableToRows(rankTable);
    // filter rows where name (col B = index 1) is not empty
    const entries = rows.filter(r => r[1] && String(r[1]).trim() !== '');
    renderLeaderboard(entries);
    lastLoaded = new Date();
    document.getElementById('updated-label').textContent = `עודכן לאחרונה: ${lastLoaded.toLocaleTimeString('he-IL')} · מתרענן אוטומטית כל דקה`;
  } catch(e) {
    renderError(e.message);
  } finally {
    btn.classList.remove('spinning');
  }
}

function renderLeaderboard(entries) {
  const wrap = document.getElementById('lb-wrap');

  // stats
  document.getElementById('stat-houses').textContent = entries.length || '0';
  const scores = entries.map(r => Number(r[3]) || 0);
  const top = scores.length ? Math.max(...scores) : 0;
  document.getElementById('stat-leader').textContent = top;
  document.getElementById('stat-pot').textContent = (entries.length * ENTRY_FEE).toLocaleString();
  document.getElementById('hero-meta').textContent =
    entries.length
      ? `${entries.length} בתים רשומים · הניקוד מתעדכן עם כל תוצאה`
      : 'טרם הוגשו בתים · הצטרפו עכשיו!';

  if (!entries.length) {
    wrap.innerHTML = `<div class="state-card"><div class="em">📋</div><p>עדיין לא הוגשו בתים.<br><b>שלחו את הקישור לקבוצה!</b></p></div>`;
    return;
  }

  // build leaderboard
  const sorted = [...entries].sort((a,b) => (Number(b[3])||0) - (Number(a[3])||0));
  const html = sorted.map((r, i) => {
    const rank = i + 1;
    const name = String(r[1] || '').trim();
    const houseKey = String(r[2] || '').trim();
    const pts = Number(r[3]) || 0;
    const medal = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank;
    const rCls = rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
    const teams = houseKey ? houseKey.split('-') : [];

    const bdGrid = teams.map(t => {
      const tn = t.trim();
      const info = TEAMS[tn] || {};
      const teamPts = TEAM_POINTS[tn] || 0;
      return `<div class="bd-item">
        <span class="fl">${info.fl||'🏳'}</span>
        <span class="tn"><b>${tn}</b><small>קטגוריה ${info.cat||'?'}</small></span>
        <span class="pt">${teamPts}</span>
      </div>`;
    }).join('');

    return `<div class="lb-row" onclick="toggleRow(this)">
      <div class="lb-main">
        <div class="rank ${rCls}">${medal}</div>
        <div class="lb-info"><b>${name}</b><small>${teams.slice(0,3).map(t=>getFlag(t)).join(' ')} ${teams.slice(3).map(t=>getFlag(t)).join(' ')}</small></div>
        <div class="lb-score">${pts}<span>נק׳</span></div>
        <div class="chev">⌄</div>
      </div>
      <div class="breakdown">
        <div class="bd-grid">${bdGrid}</div>
      </div>
    </div>`;
  }).join('');

  wrap.innerHTML = `<div class="lb">${html}</div>`;
}

function renderError(msg) {
  document.getElementById('lb-wrap').innerHTML = `
    <div class="state-card">
      <div class="em">⚠️</div>
      <p>לא ניתן היה לטעון את הנתונים.<br>
      <b>ודא שהגיליון פורסם ברבים</b><br>
      <small style="color:var(--faint)">${msg}</small></p>
    </div>`;
  document.getElementById('hero-meta').textContent = 'שגיאה בטעינת הנתונים';
}

function toggleRow(row) {
  row.classList.toggle('open');
}

/* ================================================================
   נבחרות לפי קטגוריות
   ================================================================ */
function renderTeams() {
  const wrap = document.getElementById('teams-wrap');
  let html = '';
  for (let c = 1; c <= 8; c++) {
    const cats = Object.entries(TEAMS).filter(([,v]) => v.cat === c);
    html += `<div class="cat-block">
      <div class="cat-head-row">
        <div class="cat-badge">${c}</div>
        <div><b>קטגוריה ${c}</b> <small>· ${CAT_LABEL[c]}</small></div>
      </div>
      <div class="teams-grid">
        ${cats.map(([name, info]) => `
          <div class="t-card">
            <div class="fl">${info.fl}</div>
            <div class="nm">${name}</div>
            <div class="rk">#${info.rank}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }
  wrap.innerHTML = html;
}

/* ================================================================
   ניווט בין לשוניות
   ================================================================ */
function switchTab(name) {
  ['lb','teams'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
    document.getElementById('nb-'+t).classList.toggle('active', t===name);
    document.getElementById('scr-'+t).classList.toggle('active', t===name);
  });
}

/* ================================================================
   אתחול
   ================================================================ */
renderTeams();
// חיבור כפתור הבחירה לקישור הטופס (מוגדר למעלה ב-FORM_URL)
document.getElementById('pick-cta').href = FORM_URL;
loadAll();
// רענון אוטומטי כל 60 שניות
setInterval(loadAll, 60000);
</script>
